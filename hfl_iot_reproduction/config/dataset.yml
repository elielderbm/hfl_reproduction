dataset: intel_lab

# Fonte e documentação
# download_url: https://db.csail.mit.edu/labdata/data.txt.gz
# info_url: https://db.csail.mit.edu/labdata/labdata.html

# Janela temporal e horizonte de previsão
window_size: 48     # número de amostras passadas usadas como entrada
delta_steps: 1      # prever em t+Delta (em passos de amostra)

# Variáveis usadas como entrada (todas disponíveis no Intel Lab)
features:
  - temp
  - humidity
  - light
  - voltage

# Variável-alvo por IoT (2 temp, 2 humidity, 2 light)
targets:
  iot1: temp
  iot2: temp
  iot3: humidity
  iot4: humidity
  iot5: light
  iot6: light

# Tipo de tarefa por alvo
tasks:
  temp: regression
  humidity: regression
  light: classification

# Configuração de classificação (binária)
classification:
  light:
    threshold: median   # usa a mediana do treino como corte (0/1)

# Splits temporais (ordem cronológica, sem shuffle)
splits:
  train: 0.6
  val: 0.2
  test: 0.2

# Escalonamento de features
scaling:
  method: standard   # standard | none
  with_target: true  # normaliza y por target (temp/umidade)

# Métricas de heterogeneidade (histogramas)
heterogeneity_bins: 20
