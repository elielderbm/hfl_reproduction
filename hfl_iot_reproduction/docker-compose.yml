version: "3.9"

services:
  data_prep:
    build:
      context: .
      dockerfile: docker/analyzer.Dockerfile
    image: hfl_analyzer:latest
    container_name: data_prep
    environment:
      - PYTHONUNBUFFERED=1
      - LOGS_DIR=${LOGS_DIR:-/workspace/logs}
      - OUT_DIR=${OUT_DIR:-/workspace/outputs}
    volumes:
      - ./project:/workspace/project
      - ./data:/workspace/data
      - ./config:/workspace/config
    working_dir: /workspace
    command: ["python", "data/prepare_intel_lab.py"]
    networks: [hflnet]

  cloud:
    build:
      context: .
      dockerfile: docker/cloud.Dockerfile
    image: hfl_cloud:latest
    container_name: cloud
    environment:
      - ROLE=cloud
      - SIM_ROUNDS=${SIM_ROUNDS}
      - BETA_CLOUD=${BETA_CLOUD}
      - OPTIMIZER=${OPTIMIZER:-sgd}
      - CLIP_NORM=${CLIP_NORM:-1.0}
      - LOSS_FN=${LOSS_FN:-huber}
      - LOSS_FN_CLASSIF=${LOSS_FN_CLASSIF:-binary_crossentropy}
      - HUBER_DELTA=${HUBER_DELTA:-1.0}
      - TEACHER_ENABLE=${TEACHER_ENABLE:-1}
      - TEACHER_EPOCHS=${TEACHER_EPOCHS:-5}
      - TEACHER_BATCH=${TEACHER_BATCH:-64}
      - TEACHER_LR=${TEACHER_LR:-0.001}
      - TEACHER_MAX_SAMPLES=${TEACHER_MAX_SAMPLES:-0}
      - TEACHER_REFRESH_EVERY=${TEACHER_REFRESH_EVERY:-0}
      - TEACHER_PUSH_INIT=${TEACHER_PUSH_INIT:-0}
      - TEACHER_PUSH_EVERY=${TEACHER_PUSH_EVERY:-0}
      - CLOUD_WAIT_FOR_EDGES=${CLOUD_WAIT_FOR_EDGES:-1}
      - SERVER_FT_EPOCHS=${SERVER_FT_EPOCHS:-2}
      - SERVER_FT_BATCH=${SERVER_FT_BATCH:-128}
      - SERVER_FT_EVERY=${SERVER_FT_EVERY:-1}
      - SERVER_FT_MAX_SAMPLES=${SERVER_FT_MAX_SAMPLES:-0}
      - SERVER_FT_ALPHA=${SERVER_FT_ALPHA:-0.2}
      - STUDENT_MODEL_TYPE=${STUDENT_MODEL_TYPE:-tcn}
      - STUDENT_MLP_UNITS=${STUDENT_MLP_UNITS:-64,32}
      - STUDENT_MLP_DROPOUT=${STUDENT_MLP_DROPOUT:-0.0}
      - STUDENT_TCN_FILTERS=${STUDENT_TCN_FILTERS:-8}
      - STUDENT_TCN_KERNEL=${STUDENT_TCN_KERNEL:-3}
      - STUDENT_TCN_DILATIONS=${STUDENT_TCN_DILATIONS:-1,2}
      - STUDENT_TCN_DROPOUT=${STUDENT_TCN_DROPOUT:-0.05}
      - STUDENT_TCN_DENSE=${STUDENT_TCN_DENSE:-16}
      - CLOUD_TEACHER_MODEL_TYPE=${CLOUD_TEACHER_MODEL_TYPE:-tcn}
      - CLOUD_TCN_FILTERS=${CLOUD_TCN_FILTERS:-96}
      - CLOUD_TCN_KERNEL=${CLOUD_TCN_KERNEL:-3}
      - CLOUD_TCN_DILATIONS=${CLOUD_TCN_DILATIONS:-1,2,4,8,16}
      - CLOUD_TCN_DROPOUT=${CLOUD_TCN_DROPOUT:-0.2}
      - CLOUD_TCN_DENSE=${CLOUD_TCN_DENSE:-192}
      - SAVE_GLOBAL_WEIGHTS=${SAVE_GLOBAL_WEIGHTS:-0}
      - SAVE_GLOBAL_WEIGHTS_EVERY=${SAVE_GLOBAL_WEIGHTS_EVERY:-1}
      - WEIGHTS_DIR=${WEIGHTS_DIR:-/workspace/outputs/weights}
      - WS_MAX_SIZE=${WS_MAX_SIZE:-16mb}
      - WS_PING_INTERVAL=${WS_PING_INTERVAL:-0}
      - WS_PING_TIMEOUT=${WS_PING_TIMEOUT:-0}
      - PYTHONUNBUFFERED=1
      - LOGS_DIR=${LOGS_DIR:-/workspace/logs}
      - OUT_DIR=${OUT_DIR:-/workspace/outputs}
      # 🔐 chaves válidas (64 hex = 32 bytes)
      - EDGE1_KEY=00112233445566778899AABBCCDDEEFF00112233445566778899AABBCCDDEEFF
      - EDGE2_KEY=A1B2C3D4E5F67890123456789ABCDEF0A1B2C3D4E5F67890123456789ABCDEF0
      - EDGE_KEY_HEX=${EDGE3_KEY:-11223344556677889900AABBCCDDEEFF11223344556677889900AABBCCDDEEFF}
    volumes:
      - ./project:/workspace/project
      - ./outputs:/workspace/outputs
      - ./logs:/workspace/logs
      - ./data:/workspace/data
    working_dir: /workspace
    command: ["python", "-m", "project.cloud.server"]
    networks: [hflnet]
    depends_on:
      - data_prep

  iot1:
