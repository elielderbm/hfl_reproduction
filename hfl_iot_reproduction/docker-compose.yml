      - EDGE_WAIT_FOR_IOTS=${EDGE_WAIT_FOR_IOTS:-1}
      - EDGE_WAIT_FOR_CLOUD=${EDGE_WAIT_FOR_CLOUD:-1}
      - EDGE_EXPECTED_IOTS=${EDGE1_EXPECTED_IOTS:-iot1,iot2}
      - LOGS_DIR=${LOGS_DIR:-/workspace/logs}
      - OUT_DIR=${OUT_DIR:-/workspace/outputs}
      - EDGE_WEIGHT_BY_SAMPLES=${EDGE_WEIGHT_BY_SAMPLES:-1}
      - WS_MAX_SIZE=${WS_MAX_SIZE:-16mb}
      - EDGE_FT_EPOCHS=${EDGE_FT_EPOCHS:-2}
      - EDGE_FT_BATCH=${EDGE_FT_BATCH:-128}
      - EDGE_FT_EVERY=${EDGE_FT_EVERY:-1}
      - EDGE_FT_MAX_SAMPLES=${EDGE_FT_MAX_SAMPLES:-0}
      - EDGE_FT_ALPHA=${EDGE_FT_ALPHA:-0.1}
      - EDGE_TEACHER_ENABLE=${EDGE_TEACHER_ENABLE:-0}
      - EDGE_TEACHER_EPOCHS=${EDGE_TEACHER_EPOCHS:-5}
      - EDGE_TEACHER_BATCH=${EDGE_TEACHER_BATCH:-128}
      - EDGE_TEACHER_LR=${EDGE_TEACHER_LR:-0.001}
